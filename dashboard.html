<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowSandBox | Terminal Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <!-- Google Fonts & Xterm CSS -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://jsdelivr.net" />
</head>
<body class="hacker-theme">

    <div class="sidebar">
        <div class="logo">SHADOW_SANDBOX</div>
        <div class="user-profile">
            <img id="userAvatar" src="https://placeholder.com" alt="Hacker">
            <span id="userName">loading...</span>
        </div>
        <ul class="nav-links">
            <li class="active">1) Recent</li>
            <li>2) Credits</li>
            <li onclick="document.getElementById('settingsModal').style.display='flex'">3) Settings</li>
            <li>4) Free Credits</li>
            <li>5) Support</li>
            <li>6) Your Project</li>
        </ul>
        <button id="logoutBtn" style="margin-top: auto; background: none; border: 1px solid red; color: red; cursor: pointer; padding: 5px;">LOGOUT</button>
    </div>

    <div class="main-content">
        <header>
            <h2>SYSTEM_DASHBOARD_V1.0</h2>
            <button class="create-btn" onclick="document.getElementById('createModal').style.display='flex'">+ INITIALIZE PROJECT</button>
        </header>

        <div id="projectGrid" class="project-grid">
            <!-- Պրոյեկտները կհայտնվեն այստեղ Firebase-ից -->
        </div>
    </div>

    <!-- Create Project Modal -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <h3>NEW_DEPLOYMENT</h3>
            <input type="text" id="projectName" placeholder="Project name...">
            <select id="projectType">
                <option value="html-css">HTML/CSS/JS Web</option>
                <option value="nodejs">Node.js Environment</option>
                <option value="python">Python Interpreter</option>
                <option value="docker">Docker Container</option>
            </select>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="document.getElementById('createModal').style.display='none'">ABORT</button>
                <button class="btn-confirm" id="confirmCreate">CREATE_PROJECT</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3>USER_CONFIG</h3>
            <input type="text" id="newUsername" placeholder="New Username">
            <input type="email" id="newEmail" placeholder="New Email">
            <button class="btn-confirm" onclick="alert('Verification Sent!')">VERIFY EMAIL</button>
            <button class="btn-cancel" onclick="document.getElementById('settingsModal').style.display='none'">CLOSE</button>
        </div>
    </div>

    <!-- Terminal Window (Hidden by default) -->
    <div id="terminal-container" style="display:none; position:fixed; bottom:0; right:0; width: calc(100% - 250px); height:300px; background:#000; border-top:2px solid #00ff41; z-index: 100;">
        <div style="background: #111; padding: 5px; display: flex; justify-content: space-between; border-bottom: 1px solid #333;">
            <span style="font-size: 12px; margin-left: 10px;">SHADOW_TERMINAL v2.4</span>
            <button onclick="document.getElementById('terminal-container').style.display='none'" style="background: red; border: none; color: white; cursor: pointer;">X</button>
        </div>
        <div id="xterm-div" style="height: 270px;"></div>
    </div>

    <!-- Xterm.js Logic -->
    <script src="https://jsdelivr.net"></script>
    <script type="module" src="dashboard.js"></script>
</body>
</html>
